<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="admin.css">
    <title>Interdace utilisateur</title>
</head>
<body>

<header>
<h1> Gestion des rendez-vous</h1>
<button  id="darkModeBtn"></button>
</header>

<nav>
  <a href="index.html">Afficher les créneaux (utilisateur)</a>
</nav>

<section class="auth" id="authSection">
  <h2>Accès responsable</h2>
  <p>Entrez le code d'accès pour ajouter des créneaux.</p>
  <input type="password" id="accessCode" placeholder="Code d'accès">
  <button type="button" id="accessBtn">Valider</button>
  <p id="accessMessage"></p>
</section>

<section class="admin hidden" id="adminSection">
  <h2>Ajouter un créneau (Responsable)</h2>
  <input type="date" id="date">
  <input type="time" id="heure">
  <button onclick="ajouterCreneau()">Ajouter</button>
</section>

<section id="liste"></section>

<script>
    const darkModeBtn = document.getElementById("darkModeBtn");
    if (darkModeBtn) {
        darkModeBtn.onclick = function() {
            document.body.classList.toggle("dark");
        };
    }
</script>
</body>
<script src="admin.js"></script>
</html>
